# Override reproducer section to define project specific variables.
.tioga_reproducer_vars:
  script:
    - !reference [.reproducer_vars, script]

# With GitLab CI, included files cannot be empty.
variables:
  INCLUDED_FILE_CANNOT_BE_EMPTY: "True"

########################
# Overridden shared jobs
########################
# We duplicate the shared jobs description and add necessary changes for this
# project. We keep ${PROJECT_<MACHINE>_VARIANTS} and ${PROJECT_<MACHINE>_DEPS}
# So that the comparison with the original job is easier.

# Override rocm 6.4.3 job to enforce requirement/perference on compiler.
rocmcc_6_4_3_hip:
  variables:
    SPEC: "${PROJECT_TIOGA_VARIANTS} +rocm amdgpu_target=gfx90a %%llvm-amdgpu@=6.4.3 ^hip@6.4.3 ${PROJECT_TIOGA_DEPS}"
  extends: .job_on_tioga

############
# Extra jobs
############
# We do not recommend using ${PROJECT_<MACHINE>_VARIANTS} and
# ${PROJECT_<MACHINE>_DEPS} in the extra jobs. There is no reason not to fully
# describe the spec here.
# The correct way is now to use llvm-amdgpu compiler directly as done in shared spec

# As long as cce 18 fails, we keep this one.
cce_21_0_0:
  variables:
    SPEC: "${PROJECT_TIOGA_VARIANTS} %cce@=21.0.0 ${PROJECT_TIOGA_DEPS}"
  extends: .job_on_tioga

# TODO: update cce when vetted
master:
  variables:
    SPEC: " +tests %cce@21.0.0"
  extends: .job_on_tioga
